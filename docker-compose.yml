services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pptgod
      POSTGRES_PASSWORD: pptgod
      POSTGRES_DB: pptgod
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    ports:
      - "${PPTGOD_HOST_PORT:-80}:8000"
    environment:
      - DATABASE_URL=postgresql://pptgod:pptgod@db:5432/pptgod
      - REDIS_URL=redis://redis:6379/0
      - HTTP_PROXY=${PPTGOD_HTTP_PROXY:-}
      - HTTPS_PROXY=${PPTGOD_HTTPS_PROXY:-}
      - ALL_PROXY=${PPTGOD_ALL_PROXY:-}
      - NO_PROXY=${PPTGOD_NO_PROXY:-localhost,127.0.0.1,db,redis}
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - redis
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/outputs:/app/outputs

  celery_worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    command: celery -A app.celery_app worker -l info --concurrency=${PPTGOD_CELERY_CONCURRENCY:-1}
    environment:
      - DATABASE_URL=postgresql://pptgod:pptgod@db:5432/pptgod
      - REDIS_URL=redis://redis:6379/0
      - HTTP_PROXY=${PPTGOD_HTTP_PROXY:-}
      - HTTPS_PROXY=${PPTGOD_HTTPS_PROXY:-}
      - ALL_PROXY=${PPTGOD_ALL_PROXY:-}
      - NO_PROXY=${PPTGOD_NO_PROXY:-localhost,127.0.0.1,db,redis}
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - redis
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/outputs:/app/outputs

volumes:
  postgres_data:
