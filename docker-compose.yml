services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pptgod
      POSTGRES_PASSWORD: pptgod
      POSTGRES_DB: pptgod
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    ports:
      - "${PPTGOD_HOST_PORT:-8000}:8000"
    environment:
      - DATABASE_URL=postgresql://pptgod:pptgod@db:5432/pptgod
      - REDIS_URL=redis://redis:6379/0
      - UPLOAD_DIR=/app/uploads
      - OUTPUT_DIR=/app/outputs
      - IMAGE_GEN_CACHE_DIR=/app/outputs/image-cache
      - HTTP_PROXY=${PPTGOD_HTTP_PROXY:-}
      - HTTPS_PROXY=${PPTGOD_HTTPS_PROXY:-}
      - ALL_PROXY=${PPTGOD_ALL_PROXY:-}
      - NO_PROXY=${PPTGOD_NO_PROXY:-localhost,127.0.0.1,db,redis}
    depends_on:
      - db
      - redis
    volumes:
      - ./.pptgod-data/uploads:/app/uploads
      - ./.pptgod-data/outputs:/app/outputs

  celery_text_worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    command: celery -A app.celery_app worker -l info --queues=${PPTGOD_TEXT_QUEUE:-text} --concurrency=${PPTGOD_TEXT_CELERY_CONCURRENCY:-2}
    environment:
      - DATABASE_URL=postgresql://pptgod:pptgod@db:5432/pptgod
      - REDIS_URL=redis://redis:6379/0
      - UPLOAD_DIR=/app/uploads
      - OUTPUT_DIR=/app/outputs
      - IMAGE_GEN_CACHE_DIR=/app/outputs/image-cache
      - CELERY_TEXT_QUEUE=${PPTGOD_TEXT_QUEUE:-text}
      - CELERY_IMAGE_QUEUE=${PPTGOD_IMAGE_QUEUE:-image}
      - HTTP_PROXY=${PPTGOD_HTTP_PROXY:-}
      - HTTPS_PROXY=${PPTGOD_HTTPS_PROXY:-}
      - ALL_PROXY=${PPTGOD_ALL_PROXY:-}
      - NO_PROXY=${PPTGOD_NO_PROXY:-localhost,127.0.0.1,db,redis}
    depends_on:
      - db
      - redis
    volumes:
      - ./.pptgod-data/uploads:/app/uploads
      - ./.pptgod-data/outputs:/app/outputs

  celery_image_worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    command: celery -A app.celery_app worker -l info --queues=${PPTGOD_IMAGE_QUEUE:-image} --concurrency=${PPTGOD_IMAGE_CELERY_CONCURRENCY:-2}
    environment:
      - DATABASE_URL=postgresql://pptgod:pptgod@db:5432/pptgod
      - REDIS_URL=redis://redis:6379/0
      - UPLOAD_DIR=/app/uploads
      - OUTPUT_DIR=/app/outputs
      - IMAGE_GEN_CACHE_DIR=/app/outputs/image-cache
      - CELERY_TEXT_QUEUE=${PPTGOD_TEXT_QUEUE:-text}
      - CELERY_IMAGE_QUEUE=${PPTGOD_IMAGE_QUEUE:-image}
      - HTTP_PROXY=${PPTGOD_HTTP_PROXY:-}
      - HTTPS_PROXY=${PPTGOD_HTTPS_PROXY:-}
      - ALL_PROXY=${PPTGOD_ALL_PROXY:-}
      - NO_PROXY=${PPTGOD_NO_PROXY:-localhost,127.0.0.1,db,redis}
    depends_on:
      - db
      - redis
    volumes:
      - ./.pptgod-data/uploads:/app/uploads
      - ./.pptgod-data/outputs:/app/outputs

volumes:
  postgres_data:
