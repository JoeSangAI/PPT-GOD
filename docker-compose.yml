version: "3.8"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: pptgod
      POSTGRES_PASSWORD: pptgod
      POSTGRES_DB: pptgod
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://pptgod:pptgod@db:5432/pptgod
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - redis
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/outputs:/app/outputs

  celery_worker:
    build: ./backend
    command: celery -A app.celery_app worker -l info
    environment:
      - DATABASE_URL=postgresql://pptgod:pptgod@db:5432/pptgod
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - redis
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/outputs:/app/outputs

volumes:
  postgres_data: